version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fake_news_backend
    ports:
      - "8000:8000"
    volumes:
      # Mount data and models from host to persist and share trained models
      - ./data:/app/data
      - ./models:/app/models
    environment:
      - ENV=production
    command: uvicorn src.api:app --host 0.0.0.0 --port 8000
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fake_news_frontend
    ports:
      - "8501:8501"
    environment:
      # Directs Streamlit to communicate with the backend service within the Docker network
      - API_URL=http://backend:8000
    command: streamlit run app/streamlit_app.py --server.port 8501 --server.address 0.0.0.0
    depends_on:
      backend:
        condition: service_started
